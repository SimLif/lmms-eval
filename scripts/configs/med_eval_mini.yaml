  - name: HuatuoGPT-Vision-7B
    params: 7B
    model_type: qwen2_5_vl
    pretrained: /root/paddlejob/workspace/env_run/hqguo/models/HuatuoGPT-Vision-7B
    launch: single
    gpu: 0
