    model_type: gemma3
    pretrained: /root/paddlejob/workspace/env_run/hqguo/models/MedGemma-4b-it
    launch: single
    gpu: 1
    batch_size: 1
    tags: [baseline]

  - name: LLaVA-Med-v1.5
