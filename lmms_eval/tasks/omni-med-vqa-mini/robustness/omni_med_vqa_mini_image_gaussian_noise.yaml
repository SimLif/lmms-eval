# tag: medvqa_robustness
tag: image_gaussian_noise
dataset_path: simwit/omni-med-vqa-mini-robustness
dataset_kwargs:
  token: True
task: "omni_med_vqa_mini_image_gaussian_noise"
test_split: test_image_gaussian_noise
output_type: generate_until
doc_to_visual: !function utils.omni_med_vqa_mini_doc_to_visual
doc_to_text: !function utils.omni_med_vqa_mini_doc_to_text
doc_to_target: "label"
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.omni_med_vqa_mini_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: accuracy
    aggregation: mean
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly."
  think:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices and put the letter in one \"\\boxed{}\"."
metadata:
  - version: 0.0
