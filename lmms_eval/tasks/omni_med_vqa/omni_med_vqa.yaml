dataset_path: simwit/omni-med-vqa
task: "omni_med_vqa"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.omni_med_vqa_doc_to_visual
doc_to_text: !function utils.omni_med_vqa_doc_to_text
doc_to_target: !function utils.omni_med_vqa_doc_to_target
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.omni_med_vqa_process_results
cluster_key: dataset
score_key: score
metric_list:
  - metric: accuracy
    aggregation: !function utils.omni_med_vqa_aggregate_accuracy
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly."
  think:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices and put the letter in one \"\\boxed{}\"."
metadata:
  version: 1.0
