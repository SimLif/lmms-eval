dataset_path: simwit/slake
dataset_kwargs:
  token: true
task: "slake_open"
test_split: test_open
output_type: generate_until
doc_to_visual: !function utils.slake_doc_to_visual
doc_to_text: !function utils.slake_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
  answer_type: "open"
# The return value of process_results will be used by metrics
process_results: !function utils.slake_open_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: f1
    aggregation: mean
    higher_is_better: true
  - metric: precision
    aggregation: mean
    higher_is_better: true
  - metric: recall
    aggregation: mean
    higher_is_better: true
  - metric: recall_old
    aggregation: mean
    higher_is_better: true
  - metric: bleu
    aggregation: mean
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt_en: "\nPlease answer the question concisely."
    post_prompt_zh: "\n请简要回答该问题。"
  think:
    pre_prompt: ""
    post_prompt_en: "\nPlease answer the question concisely and put the answer in one \"\\boxed{}\"."
    post_prompt_zh: "\n请简要回答该问题，并将答案放在一个\"\\boxed{}\"中。"
metadata:
  - version: 0.0
