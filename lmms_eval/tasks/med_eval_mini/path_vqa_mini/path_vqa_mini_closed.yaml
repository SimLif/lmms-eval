dataset_path: simwit/medmoe-path-vqa-mini
dataset_kwargs:
  token: true
task: "path_vqa_mini_closed"
test_split: test_closed
output_type: generate_until
doc_to_visual: !function utils.path_vqa_mini_doc_to_visual
doc_to_text: !function utils.path_vqa_mini_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
  answer_type: "closed"
# The return value of process_results will be used by metrics
process_results: !function utils.path_vqa_mini_closed_process_results
metric_list:
  - metric: accuracy
    aggregation: mean
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase."
  think:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase and put the answer in one \"\\boxed{}\"."
metadata:
  version: 1.0
